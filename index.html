<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TEMPO">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<title>TEMPO</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --surface-dk: #eaeaea;
    --border: #c4c4c4;
    --ink: #000000;
    --sub: #555555;
    --ghost: #aaaaaa;
    --yellow: #ffec00;
    --red: #cc0000;
    --accent: #000000;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #d8d8d8;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .phone {
    width: 390px; height: 844px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 40px 100px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
    position: relative;
  }

  /* On mobile — fill the screen exactly, no scroll, no phone frame */
  @media (max-width: 500px) {
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      display: block;
    }
    .phone {
      width: 100%; height: 100%; height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
    .status { display: none; }
    .hdr { padding: 0 20px 0; }
    .wordmark-sub { margin-top: 4px; }
    .tabs { padding: 7px 20px 0; }
    .detail-hdr { padding-top: 6px; }
    .fab { bottom: 90px; right: 20px; width: 56px; height: 56px; }
    .list { padding-bottom: 90px; }
    .detail-input { padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }
  }

  /* ── STATUS ── */
  .status {
    padding: 14px 28px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 5px; align-items: center; }
  .status-icons svg { width: 15px; height: 15px; }

  /* ── HEADER ── */
  .hdr {
    padding: 52px 24px 0;
    flex-shrink: 0;
  }
  .wordmark {
    display: block;
    height: 22px; width: auto;
  }
  .wordmark-sub {
    font-family: 'Aptos Black', 'Arial Black', Arial, sans-serif;
    font-size: 14px; font-weight: 900;
    color: var(--ink); margin-top: 16px;
    letter-spacing: -0.01em;
  }

  /* ── TABS ── */
  .tabs {
    display: flex; gap: 6px;
    padding: 28px 24px 0;
    flex-shrink: 0;
  }
  .tab {
    font-family: Arial, sans-serif;
    font-size: 12px; font-weight: 400;
    padding: 6px 18px; border-radius: 5px;
    border: none; cursor: pointer;
    background: var(--surface); color: var(--ink);
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.01em;
  }
  .tab:hover { background: var(--yellow); color: var(--ink); }
  .tab.on { background: var(--ink); color: #fff; }
  .tab.on:hover { background: var(--ink); }

  .feed-dot {
    display: inline-block; width: 5px; height: 5px;
    background: var(--red); border-radius: 50%;
    margin-left: 4px; vertical-align: middle; margin-top: -2px;
  }

  .hdr-rule {
    margin: 12px 24px 0;
    border: none; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── VIEWS ── */
  .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .view.on { display: flex; }

  /* ══ CAPTURE ══ */
  .cap-scroll {
    flex: 1; overflow-y: auto;
    padding: 28px 24px 36px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* Input section card */
  .input-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--ink);
    border-radius: var(--radius);
    padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .input-card-label {
    font-size: 9px; font-weight: 400; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* Mode tiles */
  .mode-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; }

  .mode-tile {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 13px 4px;
    background: var(--surface);
    border: none; border-radius: 10px;
    cursor: pointer; transition: background 0.15s;
  }
  .mode-tile:hover { background: var(--yellow); }
  .mode-tile.on { background: var(--surface-dk); }
  .mode-tile.on:hover { background: var(--yellow); }
  .mode-tile svg { width: 18px; height: 18px; stroke: var(--ghost); transition: stroke 0.15s; }
  .mode-tile.on svg, .mode-tile:hover svg { stroke: var(--ink); }
  .mode-tile span {
    font-size: 9px; font-weight: 400; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.07em;
    transition: color 0.15s;
  }
  .mode-tile.on span, .mode-tile:hover span { color: var(--ink); }

  /* Assignee toggle — inside capture, below mode tiles */
  .assignee-row {
    display: flex; gap: 6px;
  }
  .a-btn {
    font-family: Arial, sans-serif;
    font-size: 11px; font-weight: 400;
    padding: 5px 18px; border-radius: 5px;
    border: none; cursor: pointer;
    background: var(--surface); color: var(--sub);
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.01em;
  }
  .a-btn:hover { background: var(--yellow); color: var(--ink); }
  .a-btn.on { background: var(--ink); color: #fff; }

  /* Panels */
  .panel { display: none; flex-direction: column; gap: 10px; }
  .panel.on { display: flex; }

  .task-ta {
    width: 100%; min-height: 180px;
    background: transparent; border: none;
    border-radius: 0;
    padding: 4px 0;
    font-family: Arial, sans-serif;
    font-size: 12px; font-weight: 400; color: var(--ink);
    line-height: 1.6; resize: none; outline: none;
  }
  .task-ta::placeholder { color: var(--ghost); }

  /* Voice */
  .voice-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px; padding: 14px 0 6px;
  }
  .mic-btn {
    width: 68px; height: 68px; border-radius: 50%;
    background: var(--surface); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s;
  }
  .mic-btn:hover { background: var(--yellow); }
  .mic-btn.rec { background: var(--ink); animation: mpulse 1.4s ease-in-out infinite; }
  .mic-btn.rec svg { stroke: white; }
  @keyframes mpulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.15); }
    50% { box-shadow: 0 0 0 10px rgba(0,0,0,0); }
  }
  .mic-btn svg { width: 22px; height: 22px; stroke: var(--ghost); }
  .voice-lbl { font-size: 11px; color: var(--ghost); }
  .voice-timer {
    font-size: 22px; font-weight: 700; color: var(--ink);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .voice-res {
    display: none;
    border-top: 1px solid var(--border);
    padding: 10px 0 2px;
    flex-direction: column; gap: 6px;
  }
  .voice-res-lbl {
    font-size: 9px; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .voice-ta {
    width: 100%; min-height: 80px;
    background: transparent; border: none;
    padding: 4px 0;
    font-family: Arial, sans-serif;
    font-size: 12px; color: var(--ink);
    line-height: 1.6; resize: none; outline: none;
  }
  .voice-ta::placeholder { color: var(--ghost); }

  /* Image box */
  .img-box {
    width: 100%; aspect-ratio: 16/10;
    background: var(--surface); border-radius: var(--radius);
    border: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; overflow: hidden;
    position: relative; transition: background 0.15s;
  }
  .img-box:hover { background: var(--yellow); }
  .img-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; display: none; }
  .img-ph { display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 1; }
  .img-ph svg { width: 20px; height: 20px; stroke: var(--ghost); }
  .img-ph span { font-size: 11px; color: var(--ghost); }
  .img-box:hover .img-ph svg { stroke: var(--ink); }
  .img-box:hover .img-ph span { color: var(--ink); }

  .ctx-in {
    background: transparent;
    border: none; border-top: 1px solid var(--border);
    padding: 10px 0 2px;
    font-family: Arial, sans-serif;
    font-size: 12px; color: var(--ink);
    outline: none; width: 100%;
  }
  .ctx-in::placeholder { color: var(--ghost); }

  input[type=file] { display: none; }

  /* Copy button on feed card */
  .copy-btn {
    position: absolute; top: 14px; right: 24px;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ghost);
    background: none; border: none;
    transition: color 0.15s;
  }
  .copy-btn:hover { color: var(--ink); }
  .copy-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; }

  .send-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff;
    border: none; border-radius: 8px;
    font-family: Arial, sans-serif;
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .send-btn:hover { background: var(--yellow); color: var(--ink); }

  /* ══ FEED ══ */
  .feed-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .feed-bar {
    padding: 14px 24px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .feed-stat {
    font-size: 10px; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .clear-btn {
    font-size: 10px; font-weight: 400; color: var(--ghost);
    background: none; border: none; cursor: pointer;
    letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--ink); }

  .list {
    flex: 1; overflow-y: auto;
    padding: 0 20px 40px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .sec-lbl {
    font-size: 10px; font-weight: 700; color: var(--ink);
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 18px 2px 4px;
  }
  .sec-lbl:first-child { padding-top: 4px; }

  /* ── ITEM CARD ── */
  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px 13px;
    background: #f7f7f7;
    border: none;
    border-left: 4px solid var(--ink);
    user-select: none; -webkit-user-select: none;
    border-radius: var(--radius);
    transition: opacity 0.3s;
    cursor: default;
    position: relative;
  }
  .item:hover { background: var(--yellow); }
  .item.commented { border-left-color: #2563eb; }
  .item.urg { border-left-color: var(--red); }
  .item.done { border-left-color: #d0d0d0; background: #fafafa; }
  .item.done:hover { background: #f4f4f4; }
  .item.done .item-time { color: #999; }
  .item.done .tag { color: #999; background: #f0f0f0; }

  /* Circle checkbox */
  .cb {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0; margin-top: 1px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .cb:hover { border-color: var(--ink); }
  .cb.ticked { background: var(--ink); border-color: var(--ink); }
  .cb.ticked::after {
    content: ''; width: 8px; height: 4px;
    border-left: 1.5px solid white; border-bottom: 1.5px solid white;
    transform: rotate(-45deg) translateY(-1px); display: block;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-text {
    font-family: Arial, sans-serif;
    font-size: 12px; font-weight: 400; line-height: 1.6;
    color: var(--ink); margin-bottom: 4px;
    padding-right: 44px;
  }
  .item-text.struck { text-decoration: line-through; color: #777; }

  .auto-link {
    color: #2563eb; text-decoration: underline;
    word-break: break-all;
  }
  .auto-link:hover { color: var(--ink); }

  /* Comment preview on feed card */
  .item-comment-preview {
    margin-top: 6px; padding: 8px 10px;
    background: #f0f4ff; border-left: 4px solid #2563eb;
    border-radius: var(--radius);
    font-size: 11px; line-height: 1.5; color: var(--sub);
    overflow: hidden;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .item-comment-preview .preview-by {
    font-weight: 700; color: var(--ink); margin-right: 4px;
  }

  .item-time {
    display: block;
    font-size: 10px; font-weight: 400; color: var(--ghost);
    margin-bottom: 7px;
  }

  .item-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .tag {
    font-size: 8px; font-weight: 400;
    padding: 2px 7px; border-radius: 2px;
    letter-spacing: 0.04em; text-transform: uppercase;
    background: #ffffff; color: var(--ghost);
  }
  .t-urg { color: var(--red); }

  /* Kebab menu */
  .kebab {
    position: absolute; top: 14px; right: 0;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ghost);
    font-size: 14px; letter-spacing: 0.5px;
    background: none; border: none;
    transition: color 0.15s;
    line-height: 1;
  }
  .kebab:hover { color: var(--ink); }

  .kebab-menu {
    display: none;
    position: absolute; top: 32px; right: 0;
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    overflow: hidden; z-index: 50; min-width: 100px;
  }
  .kebab-menu.open { display: block; }
  .km-item {
    display: block; width: 100%;
    padding: 10px 16px;
    font-family: Arial, sans-serif;
    font-size: 12px; font-weight: 400; color: var(--ink);
    background: none; border: none; text-align: left;
    cursor: pointer; transition: background 0.1s;
    white-space: nowrap;
  }
  .km-item:hover { background: var(--surface); }
  .km-item.del { color: var(--red); }
  .km-item.urg-action { color: var(--red); font-weight: 700; }

  /* Drag-to-reorder */
  .item.hold-hint { transform: scale(0.98); background: #fffbe6; }
  .item.dragging {
    position: fixed; z-index: 100; width: calc(100% - 40px);
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    transform: scale(1.03); opacity: 0.92;
    transition: none;
  }
  .item.drag-placeholder { opacity: 0.15; }
  .item.drag-over-top { box-shadow: 0 -3px 0 0 var(--ink); }
  .item.drag-over-bot { box-shadow: 0 3px 0 0 var(--ink); }

  /* Image thumbnail in feed card */
  .item-thumb {
    max-width: 80%; aspect-ratio: 16/9;
    object-fit: cover; border-radius: 4px;
    margin-bottom: 6px; cursor: pointer;
    display: block;
    transition: opacity 0.15s;
  }
  .item-thumb:hover { opacity: 0.85; }

  .thumb-hint {
    font-size: 9px; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
  }
  .thumb-hint svg { width: 10px; height: 10px; stroke: var(--ghost); }

  /* Lightbox */
  .lightbox {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 80%;
    object-fit: contain; border-radius: 8px;
  }
  .lb-close {
    position: absolute; top: 20px; right: 20px;
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%;
    color: white; font-size: 16px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.3); }
  .lb-caption {
    margin-top: 16px; font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-align: center; line-height: 1.5;
    max-width: 100%;
  }

  /* FAB */
  .fab {
    position: absolute; bottom: 30px; right: 26px;
    width: 52px; height: 52px;
    background: var(--ink); border-radius: 12px;
    display: none; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    transition: background 0.15s; z-index: 10;
  }
  .fab.vis { display: flex; }
  .fab:hover { background: var(--yellow); }
  .fab:hover svg line { stroke: var(--ink); }
  .fab svg { width: 22px; height: 22px; }
  .fab svg line { stroke: white; stroke-width: 2.5; }

  /* TOAST */
  .toast {
    position: absolute; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: var(--ink); color: white;
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.07em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 3px;
    opacity: 0; transition: all 0.22s;
    pointer-events: none; white-space: nowrap; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 0; }

  /* ── PIN MARKER (replaces checkbox in pin view) ── */
  .pin-marker {
    width: 18px; height: 18px;
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1;
  }

  /* ── PIN SCREEN ── */
  .pin-screen {
    position: absolute; inset: 0;
    background: var(--bg);
    z-index: 300;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
  }
  .pin-screen.hidden { display: none; }
  .pin-input {
    width: 160px; padding: 12px 16px;
    font-family: Arial, sans-serif;
    font-size: 18px; font-weight: 700;
    text-align: center; letter-spacing: 0.3em;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 10px; outline: none;
    color: var(--ink);
    -webkit-text-security: disc;
  }
  .pin-input:focus { border-color: var(--ink); }
  .pin-input.error { border-color: var(--red); animation: shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-hint {
    font-size: 10px; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  /* ── USER PICKER OVERLAY ── */
  .user-picker {
    position: absolute; inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px;
  }
  .user-picker.hidden { display: none; }
  .user-picker-title {
    font-family: 'Aptos Black', 'Arial Black', Arial, sans-serif;
    font-size: 13px; font-weight: 900;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .user-picker-row { display: flex; gap: 20px; }
  .user-pick {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    cursor: pointer; padding: 20px 28px; border-radius: 16px;
    border: 2px solid var(--border);
    background: var(--bg);
    transition: all 0.15s;
  }
  .user-pick:hover { border-color: var(--ink); background: var(--yellow); }
  .user-pick .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: Arial, sans-serif;
    font-size: 20px; font-weight: 700;
  }
  .user-pick .uname {
    font-size: 12px; font-weight: 700; color: var(--ink);
    letter-spacing: 0.02em;
  }

  /* ── HEADER USER BADGE ── */
  .hdr-user {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; cursor: pointer;
    padding: 4px 0;
  }
  .hdr-user .avatar-sm {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
  }
  .hdr-user .uname-sm {
    font-size: 10px; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .hdr-user .switch-lbl {
    font-size: 9px; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.04em;
  }

  /* ── FEED CARD AUTHOR ── */
  .item-author {
    font-size: 9px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.04em;
    margin-bottom: 2px;
    display: flex; align-items: center; gap: 5px;
  }
  .avatar-xs {
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--ink); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 700;
    flex-shrink: 0;
  }

  /* ── DETAIL / THREAD VIEW ── */
  .detail-view {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg); z-index: 60;
    flex-direction: column; overflow: hidden;
  }
  .detail-view.open { display: flex; }

  .detail-hdr {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-back {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  .detail-back:hover { background: var(--yellow); }
  .detail-back svg { width: 16px; height: 16px; stroke: var(--ink); }
  .detail-title {
    font-size: 11px; font-weight: 700; color: var(--ink);
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  .detail-scroll {
    flex: 1; overflow-y: auto; padding: 18px 20px 12px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .detail-task {
    padding: 14px 16px;
    background: #f7f7f7; border-left: 4px solid var(--ink);
    border-radius: var(--radius);
  }
  .detail-task.urg { border-left-color: var(--red); }
  .detail-task-body {
    font-size: 12px; line-height: 1.6; color: var(--ink); margin-bottom: 8px;
  }
  .detail-task-meta {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  }
  .detail-task-meta .tag { font-size: 8px; }
  .detail-task-time {
    font-size: 10px; color: var(--ghost);
  }
  .detail-task-thumb {
    width: 100%; border-radius: 6px; margin-bottom: 10px; cursor: pointer;
  }

  .comments-lbl {
    font-size: 9px; font-weight: 400; color: var(--ghost);
    text-transform: uppercase; letter-spacing: 0.1em;
    padding-top: 4px;
  }

  .comments-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .comment {
    padding: 10px 14px;
    background: var(--surface); border-radius: 10px;
    position: relative;
  }
  .comment-by {
    font-size: 9px; font-weight: 700; color: var(--ink);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;
    display: flex; align-items: center;
  }
  .comment-body {
    font-size: 11px; line-height: 1.55; color: var(--ink);
    padding-right: 20px;
  }
  .comment-time {
    font-size: 9px; color: var(--ghost); margin-top: 4px;
  }
  .comment-kebab {
    position: absolute; top: 8px; right: 8px;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ghost); font-size: 12px;
    background: none; border: none; transition: color 0.15s;
  }
  .comment-kebab:hover { color: var(--ink); }
  .comment-kebab-menu {
    display: none; position: absolute; top: 24px; right: 0;
    background: white; border: 1px solid var(--border);
    border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    overflow: hidden; z-index: 50; min-width: 80px;
  }
  .comment-kebab-menu.open { display: block; }
  .comment-edit-ta {
    width: 100%; border: none; border-bottom: 1.5px solid var(--ink);
    background: transparent; font-family: Arial, sans-serif;
    font-size: 11px; line-height: 1.55; color: var(--ink);
    resize: none; outline: none; padding: 0;
  }

  .no-comments {
    font-size: 11px; color: var(--ghost); font-style: italic;
    text-align: center; padding: 16px 0;
  }

  .detail-input {
    display: flex; gap: 8px; padding: 12px 20px 28px;
    border-top: 1px solid var(--border); flex-shrink: 0;
    background: var(--bg);
  }
  .detail-ta {
    flex: 1; min-height: 36px; max-height: 80px;
    background: var(--surface); border: none; border-radius: 8px;
    padding: 9px 12px; font-family: Arial, sans-serif;
    font-size: 12px; color: var(--ink); outline: none; resize: none;
    line-height: 1.5;
  }
  .detail-ta::placeholder { color: var(--ghost); }
  .detail-send {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--ink); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.15s;
  }
  .detail-send:hover { background: var(--yellow); }
  .detail-send:hover svg { stroke: var(--ink); }
  .detail-send svg { width: 16px; height: 16px; stroke: white; }
</style>
</head>

            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          </div>
          <div class="voice-lbl" id="voiceLbl">Tap to record</div>
        </div>
        <div class="voice-res" id="voiceRes">
          <div class="voice-res-lbl">Edit transcription</div>
          <textarea class="voice-ta" id="voiceTa" placeholder="Your transcription will appear here…"></textarea>
        </div>
      </div>

      <!-- Camera -->
      <div class="panel" id="pCamera">
        <div class="img-box" onclick="document.getElementById('camFile').click()">
          <img id="camImg" alt="">
          <div class="img-ph" id="camPh">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <span>Tap to open camera</span>
          </div>
        </div>
        <input type="file" id="camFile" accept="image/*" capture="environment" onchange="handleImg(event,'cam')">
        <input class="ctx-in" type="text" id="camCtx" placeholder="Add context for this image">
      </div>

      <!-- Gallery -->
      <div class="panel" id="pGallery">
        <div class="img-box" onclick="if(!galDropFlag)document.getElementById('galFile').click()">
          <img id="galImg" alt="">
          <div class="img-ph" id="galPh">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Tap, drag, or paste an image</span>
          </div>
        </div>
        <input type="file" id="galFile" accept="image/*" onchange="handleImg(event,'gal')">
        <input class="ctx-in" type="text" id="galCtx" placeholder="Add context for this screenshot">
      </div>

      </div><!-- /input-card -->

      <button class="send-btn" onclick="sendCapture()">Send to feed</button>

    </div>
  </div>

  <!-- ══ FEED VIEW ══ -->
  <div id="vFeed" class="view on">
    <div class="feed-wrap">
      <div class="feed-bar">
        <div class="feed-stat" id="feedStat">Loading…</div>
        <button class="clear-btn" onclick="clearDone()">Clear done</button>
      </div>
      <div class="list" id="theList"></div>
    </div>
  </div>

  <!-- ══ PIN VIEW ══ -->
  <div id="vPin" class="view">
    <div class="feed-wrap">
      <div class="feed-bar">
        <div class="feed-stat" id="pinStat">0 pinned</div>
      </div>
      <div class="list" id="pinList"></div>
    </div>
  </div>

  <!-- DETAIL / THREAD VIEW -->
  <div class="detail-view" id="detailView">
    <div class="detail-hdr">
      <button class="detail-back" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="detail-scroll" id="detailScroll"></div>
    <div class="detail-input">
      <textarea class="detail-ta" id="commentTa" placeholder="Add a comment…" rows="1"></textarea>
      <button class="detail-send" onclick="postComment()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- FAB -->
  <div class="fab" id="fab" onclick="event.stopPropagation(); goView('capture')">
    <svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  /* ── Generate apple-touch-icon from SVG ── */
  (function() {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = 180; c.height = 180;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 180, 180);
      ctx.drawImage(img, 20, 20, 140, 140);
      var link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = c.toDataURL('image/png');
      document.head.appendChild(link);
    };
    img.src = '/icon.svg';
  })();

  /* ── State ── */
  var tasks = [];
  var curMode = 'type';
  var curAssignee = localStorage.getItem('tempoUser') || '';
  var voiceOn = false;

  /* ── User identity ── */
  function pickUser(name) {
    curAssignee = name;
    localStorage.setItem('tempoUser', name);
    document.getElementById('userPicker').classList.add('hidden');
    updateUserBadge();
  }

  function showUserPicker() {
    document.getElementById('userPicker').classList.remove('hidden');
  }

  function updateUserBadge() {
    var initial = curAssignee.charAt(0).toUpperCase();
    var display = curAssignee.charAt(0).toUpperCase() + curAssignee.slice(1);
    document.getElementById('hdrAvatar').textContent = initial;
    document.getElementById('hdrName').textContent = display;
  }

  /* ── PIN gate ── */
  var APP_PIN = '1234';

  function checkPin() {
    var input = document.getElementById('pinInput');
    var hint = document.getElementById('pinHint');
    var val = input.value;
    if (val.length < 4) return;
    if (val === APP_PIN) {
      sessionStorage.setItem('tempoAuth', '1');
      document.getElementById('pinScreen').classList.add('hidden');
      // Now show user picker if needed
      if (!curAssignee) {
        document.getElementById('userPicker').classList.remove('hidden');
      }
    } else {
      input.classList.add('error');
      hint.textContent = 'Wrong PIN';
      hint.style.color = 'var(--red)';
      setTimeout(function() {
        input.value = '';
        input.classList.remove('error');
        hint.textContent = 'Enter PIN';
        hint.style.color = '';
      }, 600);
    }
  }

  (function initPin() {
    var pinInput = document.getElementById('pinInput');
    pinInput.addEventListener('input', checkPin);
    // Also handle paste / enter
    pinInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPin();
    });
    // If already authed this session, skip PIN
    if (sessionStorage.getItem('tempoAuth') === '1') {
      document.getElementById('pinScreen').classList.add('hidden');
    } else {
      document.getElementById('pinScreen').classList.remove('hidden');
      pinInput.focus();
    }
  })();

  function initUser() {
    if (curAssignee) {
      document.getElementById('userPicker').classList.add('hidden');
      updateUserBadge();
    }
  }
  initUser();

  /* ── API helper ── */
  function api(path, opts) {
    opts = opts || {};
    return fetch(path, {
      method: opts.method || 'GET',
      headers: Object.assign({'Content-Type':'application/json'}, opts.headers || {}),
      body: opts.body || undefined
    }).then(function(res) {
      if (!res.ok) throw new Error('API ' + res.status);
      return res.json();
    });
  }

  /* ── Load tasks from Supabase ── */
  var commentedIds = {};
  var latestComments = {};
  var commentsLoaded = false;

  function loadCommentFlags() {
    return api('/api/comments?all=true').then(function(comments) {
      commentedIds = {};
      latestComments = {};
      comments.forEach(function(c) {
        commentedIds[c.task_id] = true;
        // First occurrence per task_id is the latest (ordered desc)
        if (!latestComments[c.task_id]) {
          latestComments[c.task_id] = c;
        }
      });
      commentsLoaded = true;
    }).catch(function(err) { console.error('Comment flags error:', err); });
  }

  function loadTasks() {
    var p = api('/api/tasks').then(function(data) {
      tasks = data;
      tasks.forEach(function(t) { t.has_comments = !!commentedIds[t.id]; });
    });
    // Load comment flags once, then refresh every 5th poll
    if (!commentsLoaded) {
      p = Promise.all([p, loadCommentFlags()]).then(function() {
        tasks.forEach(function(t) { t.has_comments = !!commentedIds[t.id]; });
      });
    }
    return p.then(function() {
      renderFeed();
      renderPinView();
    }).catch(function(err) {
      console.error('Load error:', err);
      document.getElementById('feedStat').textContent = 'Could not load tasks';
    });
  }

  var pollCount = 0;

  /* ── Render feed from tasks array ── */
  function renderFeed() {
    var list = document.getElementById('theList');
    var sortFn = function(a, b) {
      // Both have manual sort_order from drag-reorder: respect it
      if (a.sort_order != null && b.sort_order != null) return a.sort_order - b.sort_order;
      // Items without sort_order (new items) go to the top, newest first
      if (a.sort_order == null && b.sort_order == null) return new Date(b.created_at) - new Date(a.created_at);
      // New items (no sort_order) above manually-sorted ones
      if (a.sort_order == null) return -1;
      return 1;
    };
    var urgent = tasks.filter(function(t) { return !t.done && t.urgent && !t.pinned; }).sort(sortFn);
    var active = tasks.filter(function(t) { return !t.done && !t.urgent && !t.pinned; }).sort(sortFn);
    var done = tasks.filter(function(t) { return t.done && !t.pinned; }).sort(sortFn);

    var html = '';
    if (urgent.length) {
      html += '<div class="sec-lbl">Urgent</div>';
      urgent.forEach(function(t) { html += renderItem(t); });
    }
    if (active.length) {
      html += '<div class="sec-lbl">Active</div>';
      active.forEach(function(t) { html += renderItem(t); });
    }
    if (done.length) {
      html += '<div class="sec-lbl">Done</div>';
      done.forEach(function(t) { html += renderItem(t); });
    }
    if (!tasks.length) {
      html = '<div style="text-align:center;padding:40px 0;color:#aaa;font-size:12px;">No tasks yet — capture something</div>';
    }
    list.innerHTML = html;
    updateCount();
  }

  function renderItem(t) {
    var urgCls = (t.urgent && !t.done) ? ' urg' : '';
    var doneCls = t.done ? ' done' : '';
    var tickCls = t.done ? ' ticked' : '';
    var strCls = t.done ? ' struck' : '';
    var ts = timeAgo(t.created_at);

    var thumb = '';
    if (t.image_url) {
      thumb = '<div class="thumb-hint"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" width="10" height="10" stroke="#aaa"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Camera capture — tap to view</div>' +
        '<img class="item-thumb" src="' + esc(t.image_url) + '" alt="" loading="lazy" onclick="openLightbox(this)">';
    }

    var commentCls = t.has_comments ? ' commented' : '';
    var pinnedCls = t.pinned ? ' pinned' : '';

    // Latest comment preview
    var previewHtml = '';
    var lc = latestComments[t.id];
    if (lc) {
      var lcInit = lc.created_by ? lc.created_by.charAt(0).toUpperCase() : '';
      previewHtml = '<div class="item-comment-preview">' +
        (lcInit ? '<span class="avatar-xs" style="margin-right:6px;">' + lcInit + '</span>' : '') +
        linkify(lc.body) + '</div>';
    }

    // Pinned items: pin icon instead of checkbox, simplified kebab
    if (t.pinned) {
      return '<div class="item' + commentCls + ' pinned" data-id="' + t.id + '">' +
        '<div class="pin-marker">📌</div>' +
        '<div class="item-body" onclick="openDetail(\'' + t.id + '\')">' +
          thumb +
          '<div class="item-text">' + linkify(t.body) + '</div>' +
          '<span class="item-time">' + (t.created_by ? '<span class="avatar-xs">' + esc(t.created_by.charAt(0).toUpperCase()) + '</span> ' : '') + ts + '</span>' +
          previewHtml +
          '<button class="copy-btn" onclick="event.stopPropagation();copyTask(\'' + t.id + '\')" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
          '<button class="kebab" onclick="event.stopPropagation();toggleKebab(this)">⋯</button>' +
          '<div class="kebab-menu">' +
            '<button class="km-item" onclick="event.stopPropagation();editItem(\'' + t.id + '\')">Edit</button>' +
            '<button class="km-item" onclick="event.stopPropagation();togglePin(\'' + t.id + '\',false)">Unpin</button>' +
            '<button class="km-item del" onclick="event.stopPropagation();deleteTask(\'' + t.id + '\')">Delete</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }

    // Regular feed items
    var urgLabel = t.urgent ? 'Remove urgent' : 'Make urgent';
    var urgItemCls = t.urgent ? 'km-item' : 'km-item urg-action';

    return '<div class="item' + urgCls + doneCls + commentCls + '" data-id="' + t.id + '">' +
      '<div class="cb' + tickCls + '" onclick="event.stopPropagation();toggleDone(\'' + t.id + '\',' + !t.done + ')"></div>' +
      '<div class="item-body" onclick="openDetail(\'' + t.id + '\')">' +
        thumb +
        '<div class="item-text' + strCls + '">' + linkify(t.body) + '</div>' +
        '<span class="item-time">' + (t.created_by ? '<span class="avatar-xs">' + esc(t.created_by.charAt(0).toUpperCase()) + '</span> ' : '') + (t.done ? 'Done ' + ts : ts) + '</span>' +
        previewHtml +
        '<button class="copy-btn" onclick="event.stopPropagation();copyTask(\'' + t.id + '\')" title="Copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>' +
        '<button class="kebab" onclick="event.stopPropagation();toggleKebab(this)">⋯</button>' +
        '<div class="kebab-menu">' +
          '<button class="km-item" onclick="event.stopPropagation();editItem(\'' + t.id + '\')">Edit</button>' +
          '<button class="km-item" onclick="event.stopPropagation();togglePin(\'' + t.id + '\',true)">Pin</button>' +
          '<button class="' + urgItemCls + '" onclick="event.stopPropagation();toggleUrgent(\'' + t.id + '\',' + !t.urgent + ')">' + urgLabel + '</button>' +
          '<button class="km-item del" onclick="event.stopPropagation();deleteTask(\'' + t.id + '\')">Delete</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function linkify(s) {
    var safe = esc(s);
    return safe.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" class="auto-link" onclick="event.stopPropagation()">$1</a>');
  }

  function timeAgo(d) {
    var s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
    if (s < 60) return 'Just now';
    if (s < 3600) return Math.floor(s / 60) + ' min ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    if (s < 172800) return 'Yesterday';
    return Math.floor(s / 86400) + ' days ago';
  }

  /* ── Image upload helper ── */
  function uploadImage(imgEl) {
    if (!imgEl || imgEl.style.display === 'none' || !imgEl.src) return Promise.resolve(null);
    var src = imgEl.src;
    if (!src.startsWith('data:')) return Promise.resolve(null);
    var match = src.match(/^data:(image\/\w+);base64,(.+)$/);
    if (!match) return Promise.resolve(null);
    return api('/api/upload', {
      method: 'POST',
      body: JSON.stringify({ contentType: match[1], base64: match[2] })
    }).then(function(r) { return r.url; })
      .catch(function(err) { console.error('Upload error:', err); return null; });
  }

  /* ── Capture flow — uploads image, saves to Supabase ── */
  function sendCapture() {
    var rawInput = '';
    var imgEl = null;
    if (curMode === 'type') rawInput = document.getElementById('taskTa').value.trim();
    else if (curMode === 'voice') {
      rawInput = document.getElementById('voiceTa').value.trim();
    }
    else if (curMode === 'camera') {
      rawInput = document.getElementById('camCtx').value.trim() || 'Camera capture';
      imgEl = document.getElementById('camImg');
    }
    else if (curMode === 'gallery') {
      rawInput = document.getElementById('galCtx').value.trim() || 'Screenshot capture';
      imgEl = document.getElementById('galImg');
    }

    if (!rawInput) { showToast('Nothing to send'); return; }

    var btn = document.querySelector('.send-btn');
    btn.textContent = 'SENDING…'; btn.disabled = true;

    var imageUrl = null;

    /* Step 1: Upload image if present */
    uploadImage(imgEl).then(function(url) {
      imageUrl = url;
      /* Step 2: Save to Supabase */
      var task = {
        body: rawInput,
        urgent: false,
        raw_input: rawInput,
        created_by: curAssignee
      };
      if (imageUrl) task.image_url = imageUrl;
      return api('/api/tasks', { method: 'POST', body: JSON.stringify(task) });
    }).then(function() {
      resetCapture();
      showToast('Sent to feed');
      return loadTasks();
    }).then(function() {
      setTimeout(function() { goView('feed'); }, 400);
    }).catch(function(err) {
      console.error('Capture error:', err);
      showToast('Error — try again');
    }).finally(function() {
      btn.textContent = 'SEND TO FEED'; btn.disabled = false;
    });
  }

  function resetCapture() {
    document.getElementById('taskTa').value = '';
    document.getElementById('voiceRes').style.display = 'none';
    document.getElementById('voiceTa').value = '';
    document.getElementById('voiceLbl').textContent = 'Tap to record';
    document.getElementById('voiceTimer').style.display = 'none';
    if (voiceOn && mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    voiceOn = false;
    clearInterval(voiceTimerInterval);
    ['cam','gal'].forEach(function(t) {
      document.getElementById(t+'Img').style.display = 'none';
      document.getElementById(t+'Ph').style.display = 'flex';
    });
    document.getElementById('camCtx').value = '';
    document.getElementById('galCtx').value = '';
  }

  /* ── Copy task text ── */
  function copyTask(id) {
    var t = tasks.find(function(t) { return t.id === id; });
    if (!t) return;
    var text = t.body || '';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        showToast('Copied');
      }).catch(function() { showToast('Copy failed'); });
    } else {
      showToast('Copy not supported');
    }
  }

  /* ── CRUD operations ── */
  function toggleDone(id, done) {
    // Optimistic: update local data and re-render immediately
    var t = tasks.find(function(t) { return t.id === id; });
    if (t) { t.done = done; renderFeed(); }
    api('/api/tasks?id=' + id, {
      method: 'PATCH', body: JSON.stringify({ done: done })
    }).catch(function() {
      showToast('Error updating task');
      if (t) { t.done = !done; renderFeed(); }
    });
  }

  function toggleUrgent(id, urgent) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    // Optimistic
    var t = tasks.find(function(t) { return t.id === id; });
    if (t) { t.urgent = urgent; renderFeed(); }
    api('/api/tasks?id=' + id, {
      method: 'PATCH', body: JSON.stringify({ urgent: urgent })
    }).catch(function() {
      showToast('Error updating');
      if (t) { t.urgent = !urgent; renderFeed(); }
    });
  }

  function togglePin(id, pinned) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    var t = tasks.find(function(t) { return t.id === id; });
    if (t) { t.pinned = pinned; renderFeed(); renderPinView(); }
    api('/api/tasks?id=' + id, {
      method: 'PATCH', body: JSON.stringify({ pinned: pinned })
    }).catch(function() {
      showToast('Error updating');
      if (t) { t.pinned = !pinned; renderFeed(); renderPinView(); }
    });
  }

  function renderPinView() {
    var list = document.getElementById('pinList');
    var pinned = tasks.filter(function(t) { return t.pinned; });
    var sortFn = function(a, b) {
      if (a.sort_order != null && b.sort_order != null) return a.sort_order - b.sort_order;
      if (a.sort_order == null && b.sort_order == null) return new Date(b.created_at) - new Date(a.created_at);
      if (a.sort_order == null) return -1;
      return 1;
    };
    pinned.sort(sortFn);
    var html = '';
    if (pinned.length) {
      pinned.forEach(function(t) { html += renderItem(t); });
    } else {
      html = '<div style="text-align:center;padding:40px 0;color:#aaa;font-size:12px;">No pinned items yet — pin from the feed</div>';
    }
    list.innerHTML = html;
    document.getElementById('pinStat').textContent = pinned.length + ' pinned';
  }

  function deleteTask(id) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    // Optimistic: remove from local array and re-render
    var removed = null;
    var idx = -1;
    tasks.forEach(function(t, i) { if (t.id === id) { removed = t; idx = i; } });
    if (idx > -1) tasks.splice(idx, 1);
    renderFeed(); renderPinView();
    api('/api/tasks?id=' + id, { method: 'DELETE' }).catch(function() {
      showToast('Error deleting');
      if (removed) { tasks.splice(idx, 0, removed); renderFeed(); renderPinView(); }
    });
  }

  var editingId = null;

  function editItem(id) {
    document.querySelectorAll('.kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    editingId = id;
    var item = document.querySelector('[data-id="' + id + '"]');
    if (!item) return;
    var textDiv = item.querySelector('.item-text');
    if (textDiv.querySelector('textarea')) return;
    var current = textDiv.textContent.trim();

    // Hide other elements while editing
    var timeEl = item.querySelector('.item-time');
    var copyEl = item.querySelector('.copy-btn');
    var kebabEl = item.querySelector('.kebab');
    if (timeEl) timeEl.style.display = 'none';
    if (copyEl) copyEl.style.display = 'none';
    if (kebabEl) kebabEl.style.display = 'none';

    var ta = document.createElement('textarea');
    ta.style.cssText = 'font-family:Arial,sans-serif;font-size:11px;font-weight:400;line-height:1.55;color:var(--ink);background:var(--bg);border:none;border-bottom:1.5px solid var(--ink);padding:2px 0;width:100%;outline:none;resize:none;user-select:text;-webkit-user-select:text;';
    ta.value = current;

    // Auto-size rows to fit content
    var lines = Math.max(2, Math.ceil(current.length / 40));
    ta.rows = Math.min(lines, 6);

    textDiv.textContent = ''; textDiv.appendChild(ta);

    // Place cursor at end (not select all)
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    var saved = false;
    function save() {
      if (saved) return;
      saved = true;
      var newText = ta.value.trim() || current;
      textDiv.textContent = newText;
      editingId = null;
      if (timeEl) timeEl.style.display = '';
      if (copyEl) copyEl.style.display = '';
      if (kebabEl) kebabEl.style.display = '';
      if (newText !== current) {
        var t = tasks.find(function(t) { return t.id === id; });
        if (t) t.body = newText;
        api('/api/tasks?id=' + id, { method: 'PATCH', body: JSON.stringify({ body: newText }) })
          .catch(function() { showToast('Error saving edit'); });
      }
    }
    ta.addEventListener('blur', save);
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
      if (e.key === 'Escape') { ta.value = current; ta.blur(); }
    });
  }

    var doneTasks = tasks.filter(function(t) { return t.done; });
    if (!doneTasks.length) { showToast('No done items'); return; }
    showToast('Clearing…');

    doneTasks.forEach(function(t) {
      chain = chain.then(function() {

      });
    });
    chain.then(loadTasks).then(function() { showToast('Done items cleared'); })
      .catch(function() { showToast('Error clearing'); loadTasks(); });

  /* ── Voice — MediaRecorder + Whisper ── */
  var mediaRecorder = null;
  var audioChunks = [];
  var voiceTimerInterval = null;
  var voiceStartTime = 0;

  function formatTime(sec) {
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function toggleVoice() {
    var btn = document.getElementById('micBtn');
    var lbl = document.getElementById('voiceLbl');
    var res = document.getElementById('voiceRes');
    var timer = document.getElementById('voiceTimer');

    // Stop recording
    if (voiceOn) {
      voiceOn = false;
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      btn.className = 'mic-btn';
      lbl.textContent = 'Transcribing…';
      clearInterval(voiceTimerInterval);
      return;
    }

    // Start recording
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showToast('Microphone not supported'); return;
    }

    voiceOn = true;
    audioChunks = [];
    btn.className = 'mic-btn rec';
    lbl.textContent = 'Recording — tap to stop';
    res.style.display = 'none';
    timer.style.display = 'block';
    timer.textContent = '0:00';
    voiceStartTime = Date.now();

    voiceTimerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - voiceStartTime) / 1000);
      timer.textContent = formatTime(elapsed);
    }, 1000);

    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      // Pick best supported format
      var mimeType = 'audio/webm';
      if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
        mimeType = 'audio/webm;codecs=opus';
      } else if (MediaRecorder.isTypeSupported('audio/mp4')) {
        mimeType = 'audio/mp4';
      }

      mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        // Stop all tracks to release mic
        stream.getTracks().forEach(function(t) { t.stop(); });
        timer.style.display = 'none';

        if (!audioChunks.length) {
          lbl.textContent = 'Tap to record';
          return;
        }

        var blob = new Blob(audioChunks, { type: mimeType });
        transcribeAudio(blob, mimeType);
      };

      mediaRecorder.start(1000); // collect chunks every second
    }).catch(function(err) {
      voiceOn = false;
      mediaRecorder = null;
      audioChunks = [];
      clearInterval(voiceTimerInterval);
      timer.style.display = 'none';
      btn.className = 'mic-btn';
      if (err.name === 'NotAllowedError') {
        lbl.textContent = 'Mic access denied — check browser settings';
      } else {
        lbl.textContent = 'Tap to record';
        showToast('Mic error: ' + err.message);
      }
    });
  }

  function transcribeAudio(blob, mimeType) {
    var lbl = document.getElementById('voiceLbl');
    var res = document.getElementById('voiceRes');
    var ta = document.getElementById('voiceTa');

    lbl.textContent = 'Transcribing…';

    // Convert blob to base64
    var reader = new FileReader();
    reader.onloadend = function() {
      var base64 = reader.result.split(',')[1];

      fetch('/api/whisper', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ base64: base64, mimeType: mimeType })
      }).then(function(r) {
        return r.json().then(function(data) { return { ok: r.ok, status: r.status, data: data }; });
      }).then(function(result) {
        if (result.ok && result.data.text) {
          ta.value = result.data.text;
          res.style.display = 'flex';
          lbl.textContent = 'Tap to re-record';
        } else if (result.ok) {
          lbl.textContent = 'No speech detected — tap to retry';
        } else {
          console.error('Whisper API error:', result.status, result.data);
          lbl.textContent = 'Error — tap to retry';
          showToast(result.data.error || 'Transcription failed');
        }
      }).catch(function(err) {
        console.error('Whisper error:', err);
        lbl.textContent = 'Error — tap to retry';
        showToast('Network error');
      });
    };
    reader.readAsDataURL(blob);
  }

  /* ── Drag-to-reorder (touch + mouse) ── */
  var dragState = null;

  function initDrag() {
    var lists = [document.getElementById('theList'), document.getElementById('pinList')];
    function mouseDownHandler(e) {
      if (e.button !== 0) return;
      e.preventDefault();
      dragStart({ target: e.target, touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: function(){}, _mouse: true });
    }
    lists.forEach(function(list) {
      // Touch: hold-to-drag (avoids scroll conflict)
      list.addEventListener('touchstart', dragStart, { passive: false });
      // Mouse: drag on movement (no hold delay needed)
      list.addEventListener('mousedown', mouseDownHandler);
    });
    document.addEventListener('touchmove', dragMove, { passive: false });
    document.addEventListener('touchend', dragEnd);
    document.addEventListener('mousemove', function(e) {
      if (dragState) dragMove({ touches: [{ clientX: e.clientX, clientY: e.clientY }], preventDefault: function(){} });
    });
    document.addEventListener('mouseup', function() {
      if (dragState) dragEnd();
    });
  }

  function dragStart(e) {
    var item = e.target.closest('.item');
    if (!item) return;
    if (e.target.closest('.cb') || e.target.closest('.kebab') || e.target.closest('.km-item') || e.target.closest('.item-thumb') || e.target.closest('.copy-btn')) return;
    var touch = e.touches[0];
    var rect = item.getBoundingClientRect();
    var isMouse = !!e._mouse;
    dragState = {
      el: item,
      id: item.getAttribute('data-id'),
      startY: touch.clientY,
      startX: touch.clientX,
      offsetY: touch.clientY - rect.top,
      rect: rect,
      active: false,
      isMouse: isMouse,
      lastOver: null,
      lastAbove: false
    };

    if (isMouse) {
      // Mouse: activate immediately with visual hint, drag starts on move
      item.classList.add('hold-hint');
    } else {
      // Touch: use timers to avoid scroll conflict
      dragState.holdTimer = setTimeout(function() {
        if (!dragState) return;
        item.classList.add('hold-hint');
        if (navigator.vibrate) navigator.vibrate(20);
      }, 120);
      dragState.activateTimer = setTimeout(function() {
        if (!dragState) return;
        activateDrag(touch);
      }, 250);
    }
  }

  function activateDrag(touch) {
    if (!dragState) return;
    var item = dragState.el;
    var rect = dragState.rect;
    dragState.active = true;
    item.classList.remove('hold-hint');

    // Create placeholder in the list
    var ph = document.createElement('div');
    ph.className = item.className + ' drag-placeholder';
    ph.style.height = rect.height + 'px';
    ph.setAttribute('data-placeholder', '1');
    item.parentNode.insertBefore(ph, item);
    dragState.placeholder = ph;

    // Lift item to fixed position following finger
    item.classList.add('dragging');
    item.style.left = rect.left + 'px';
    item.style.top = rect.top + 'px';
    item.style.width = rect.width + 'px';

    if (navigator.vibrate) navigator.vibrate(30);
  }

  function dragMove(e) {
    if (!dragState) return;
    var touch = e.touches[0];

    // Not yet active — decide whether to activate or cancel
    if (!dragState.active) {
      var dx = Math.abs(touch.clientX - dragState.startX);
      var dy = Math.abs(touch.clientY - dragState.startY);
      if (dragState.isMouse) {
        // Mouse: activate drag after 5px vertical movement
        if (dy > 5) {
          activateDrag(touch);
        } else if (dx > 15) {
          // Horizontal movement — cancel (probably selecting)
          if (dragState.el) dragState.el.classList.remove('hold-hint');
          dragState = null;
        }
      } else {
        // Touch: cancel if moved before hold timer fires (user is scrolling)
        if (dx > 8 || dy > 8) {
          clearTimeout(dragState.holdTimer);
          clearTimeout(dragState.activateTimer);
          if (dragState.el) dragState.el.classList.remove('hold-hint');
          dragState = null;
        }
      }
      return;
    }

    e.preventDefault();

    // Move item with finger
    dragState.el.style.top = (touch.clientY - dragState.offsetY) + 'px';

    // Find element under finger (dragging item has pointer-events:none)
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var overItem = el ? el.closest('.item') : null;

    // Clear previous indicators
    document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(function(n) {
      n.classList.remove('drag-over-top', 'drag-over-bot');
    });

    if (overItem && overItem !== dragState.el && !overItem.hasAttribute('data-placeholder')) {
      var oRect = overItem.getBoundingClientRect();
      var mid = oRect.top + oRect.height / 2;
      var above = touch.clientY < mid;
      overItem.classList.add(above ? 'drag-over-top' : 'drag-over-bot');
      dragState.lastOver = overItem;
      dragState.lastAbove = above;
    }
  }

  function dragEnd(e) {
    if (!dragState) return;
    clearTimeout(dragState.holdTimer);
    clearTimeout(dragState.activateTimer);
    var wasActive = dragState.active;
    var wasMouse = dragState.isMouse;
    var srcId = dragState.id;
    var overItem = dragState.lastOver;
    var above = dragState.lastAbove;
    var el = dragState.el;
    var ph = dragState.placeholder;

    // Clean up
    el.classList.remove('dragging', 'hold-hint');
    el.style.position = ''; el.style.left = ''; el.style.top = ''; el.style.width = ''; el.style.zIndex = '';
    if (ph && ph.parentNode) ph.parentNode.removeChild(ph);
    document.querySelectorAll('.drag-over-top,.drag-over-bot').forEach(function(n) {
      n.classList.remove('drag-over-top', 'drag-over-bot');
    });

    dragState = null;

    // Mouse: if drag never activated, it was a click — trigger the normal action
    if (wasMouse && !wasActive) {
      var body = el.querySelector('.item-body');
      if (body) body.click();
      return;
    }
    if (!wasActive || !overItem) return;

    var destId = overItem.getAttribute('data-id');
    if (srcId === destId) return;

    var srcTask = tasks.find(function(t) { return t.id === srcId; });
    var destTask = tasks.find(function(t) { return t.id === destId; });
    if (!srcTask || !destTask) return;

    var srcSection = srcTask.pinned ? 'pinned' : (srcTask.done ? 'done' : (srcTask.urgent ? 'urgent' : 'active'));
    var destSection = destTask.pinned ? 'pinned' : (destTask.done ? 'done' : (destTask.urgent ? 'urgent' : 'active'));
    if (srcSection !== destSection) { showToast('Drag within same section'); return; }

    var sectionTasks = tasks.filter(function(t) {
      if (srcSection === 'pinned') return t.pinned;
      if (srcSection === 'done') return t.done && !t.pinned;
      if (srcSection === 'urgent') return !t.done && t.urgent && !t.pinned;
      return !t.done && !t.urgent && !t.pinned;
    });

    var srcIdx = sectionTasks.indexOf(srcTask);
    var destIdx = sectionTasks.indexOf(destTask);
    if (srcIdx === -1 || destIdx === -1) return;

    sectionTasks.splice(srcIdx, 1);
    var insertIdx = sectionTasks.indexOf(destTask);
    if (!above) insertIdx++;
    sectionTasks.splice(insertIdx, 0, srcTask);

    sectionTasks.forEach(function(t, i) { t.sort_order = i; });
    renderFeed();
    renderPinView();

    // Persist
    sectionTasks.forEach(function(t) {
      api('/api/tasks?id=' + t.id, {
        method: 'PATCH',
        body: JSON.stringify({ sort_order: t.sort_order })
      }).catch(function() {});
    });
  }

  initDrag();

  function editComment(cid) {
    document.querySelectorAll('.comment-kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    var el = document.querySelector('[data-cid="' + cid + '"]');
    if (!el) return;
    var bodyEl = el.querySelector('.comment-body');
    var original = bodyEl.textContent;
    var ta = document.createElement('textarea');
    ta.className = 'comment-edit-ta';
    ta.value = original;
    ta.rows = Math.max(2, original.split('\n').length);
    bodyEl.style.display = 'none';
    bodyEl.parentNode.insertBefore(ta, bodyEl.nextSibling);
    ta.focus();
    ta.selectionStart = ta.value.length;

    var saved = false;
    function save() {
      if (saved) return;
      saved = true;
      var newBody = ta.value.trim();
      if (!newBody || newBody === original) {
        ta.remove();
        bodyEl.style.display = '';
        return;
      }
      bodyEl.innerHTML = linkify(newBody);
      bodyEl.style.display = '';
      ta.remove();
      // Update latest comment cache
      if (latestComments[activeTaskId] && latestComments[activeTaskId].body === original) {
        latestComments[activeTaskId].body = newBody;
        renderFeed(); renderPinView();
      }
      api('/api/comments?id=' + cid, {
        method: 'PATCH', body: JSON.stringify({ body: newBody })
      }).catch(function() {
        showToast('Error saving comment');
        bodyEl.innerHTML = linkify(original);
      });
    }
    ta.addEventListener('blur', save);
    ta.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
      if (e.key === 'Escape') { saved = true; ta.remove(); bodyEl.style.display = ''; }
    });
  }

  function deleteComment(cid) {
    document.querySelectorAll('.comment-kebab-menu.open').forEach(function(m) { m.classList.remove('open'); });
    var el = document.querySelector('[data-cid="' + cid + '"]');
    if (el) el.remove();
    api('/api/comments?id=' + cid, { method: 'DELETE' }).then(function() {
      // Refresh comment flags and preview
      loadCommentFlags().then(function() {
        tasks.forEach(function(t) { t.has_comments = !!commentedIds[t.id]; });
        renderFeed(); renderPinView();
      });
    }).catch(function() {
      showToast('Error deleting comment');
      if (activeTaskId) loadComments(activeTaskId);
    });
  }

  function postComment() {
    if (!activeTaskId) return;
    var ta = document.getElementById('commentTa');
    var body = ta.value.trim();
    if (!body) return;
    ta.value = '';

    // Optimistic: mark task as commented for blue border + update preview
    commentedIds[activeTaskId] = true;
    latestComments[activeTaskId] = { body: body, created_by: curAssignee, created_at: new Date().toISOString() };
    var t = tasks.find(function(t) { return t.id === activeTaskId; });
    if (t) t.has_comments = true;
    renderFeed(); renderPinView();

    // Optimistic: show comment immediately
    var el = document.getElementById('commentsList');
    var noComments = el.querySelector('.no-comments');
    if (noComments) el.innerHTML = '<div class="comments-list"></div>';
    var list = el.querySelector('.comments-list') || el;
    var cInit = curAssignee ? curAssignee.charAt(0).toUpperCase() : '?';
    list.insertAdjacentHTML('beforeend',
      '<div class="comment">' +
        '<div class="comment-by"><span class="avatar-xs">' + cInit + '</span></div>' +
        '<div class="comment-body">' + linkify(body) + '</div>' +
        '<div class="comment-time">Just now</div>' +
      '</div>');
    var scroll = document.getElementById('detailScroll');
    scroll.scrollTop = scroll.scrollHeight;

    // Persist in background
    api('/api/comments', {
      method: 'POST',
      body: JSON.stringify({
        task_id: activeTaskId,
        body: body,
        created_by: curAssignee
      })
    }).catch(function() {
      showToast('Error posting comment');
      loadComments(activeTaskId);
    });
  }

  // Enter key to send comment
  document.getElementById('commentTa').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postComment(); }
  });

  /* ── Enter key sends from capture textarea ── */
  document.getElementById('taskTa').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCapture(); }
  });

  /* ── Init + polling ── */
  goView('feed');
  setInterval(function() {
    if (document.hidden) return; // Save battery when tab not visible
    pollCount++;
    if (pollCount % 5 === 0) loadCommentFlags();
    loadTasks();
  }, 30000);
  // Refresh immediately when user returns to the tab
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) loadTasks();
  });
</script>
</body>
</html>
